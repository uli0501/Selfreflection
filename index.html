<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魚缸測試</title>
    <style>
        :root { --primary: #4A90E2; --bg: #f8f9fa; --text-dark: #2d3748; --card-bg: #ffffff; }
        
        /* 修改背景為指定的漸層色 */
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(135deg, #7bc4cc, #2a6a7a, #0a2a35, #051820);
            background-attachment: fixed; /* 確保漸層填滿整個視窗不隨捲動斷開 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        
        .container { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); /* 稍微加深陰影讓白盒在深色背景更明顯 */
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            box-sizing: border-box;
        }

                /* 圖表容器：控制寬度並保持比例 */
        .chart-wrapper {
            width: 100%;             /* 填滿父容器 600px */
            position: relative;
            padding-bottom: 65%;     /* 控制圖表高度比例 (約 16:10) */
            height: 0;
            overflow: hidden;
            border-radius: 12px;     /* 讓圖表邊角跟選項框一樣圓潤 */
            border: 1px solid #edf2f7;
        }
        
        /* 讓內部 iframe 撐滿容器 */
        .chart-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        #progress { color: #a0aec0; font-size: 13px; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase; }
        #question-title { margin: 0; color: var(--text-dark); line-height: 1.6; font-size: 18px; font-weight: 500; text-align: center; }
        .highlight { display: block; margin-top: 15px; font-size: 20px; font-weight: 800; color: var(--text-dark); text-align: center; }
        
        #options-container { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .option-box { padding: 18px; border: 2px solid #edf2f7; border-radius: 12px; cursor: pointer; transition: all 0.2s; font-size: 17px; background: #fff; color: #4a5568; -webkit-tap-highlight-color: transparent; }
        .option-box:hover { border-color: var(--primary); background: #ebf4ff; color: var(--primary); transform: translateY(-2px); }
        
        /* 載入中畫面樣式 */
        #loading-section { padding: 40px 0; color: var(--text-dark); font-weight: 500; }
        .spinner { width: 45px; height: 45px; border: 5px solid #edf2f7; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            #question-title { font-size: 16px; }
            .highlight { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="quiz-section">
        <div id="progress">STEP 1 / 3</div>
        <div id="question-title">載入中...</div>
        <div id="options-container"></div>
    </div>

    <div id="loading-section" class="hidden">
        <div class="spinner"></div>
        <div id="loading-text">正在將您的回答上傳至系統...</div>
    </div>

    <div id="thank-you" class="hidden">
        <div style="font-size: 60px; margin-bottom: 20px;"></div>
        <h2>✨感謝您的參與✨</h2> <br>您的填答已成功寫入資料庫。<br>看看其他魚兒留下的紀錄吧！</p>
            <div class="chart-section" style="margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 20px;">
        
        <div class="chart-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTW8qmgdGotNqiZykw6Sds5rcFBuvnm5yUEMfnOm_-G-qdk_TxXDE8tumZA9c7e9xD1Sw1Fj4_KhSy9/pubchart?oid=992584688&amp;format=interactive"></iframe>
        </div>
                
        <div class="chart-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTW8qmgdGotNqiZykw6Sds5rcFBuvnm5yUEMfnOm_-G-qdk_TxXDE8tumZA9c7e9xD1Sw1Fj4_KhSy9/pubchart?oid=1054188959&amp;format=interactive"></iframe>
        </div>
        
        <div class="chart-wrapper">
            <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTW8qmgdGotNqiZykw6Sds5rcFBuvnm5yUEMfnOm_-G-qdk_TxXDE8tumZA9c7e9xD1Sw1Fj4_KhSy9/pubchart?oid=601164440&amp;format=interactive"></iframe>
        </div>
    </div>
    </div>
</div>

<script>
    const questions = [
        { 
            id: 'q1', 
            title: `數位平台的使用者，為什麼被稱作受眾呢？<br>因為它是一種被導流的使用行為。<br>我們以為自己在選擇，其實只是順著流。<br>
                    <span class="highlight">請回憶，演算法經常將哪一類內容推到你眼前？</span>`, 
            pool: ['美食', '迷因', '運動', '旅遊', '追星', '動物', '攝影', '美妝', '知識', '其他'] 
        },
        { 
            id: 'q2', 
            title:  `如同經營水族店，需要調整魚缸的水溫、光線及水質，為魚群打造適合的生活環境。<br>數位平台也透過演算法、觸及率與推薦內容，為你調配視界。<br>
                    <span class="highlight">你會自主調整平台環境嗎？對於不感興趣的資訊，你通常怎麼處理？</span>`,
            pool: ['按不感興趣', '搜尋別的內容', '默默看完', '取消追蹤', '就滑掉', '檢舉'] 
        },
        { 
            id: 'q3', 
            title:  `數位平台的內容，為了被識別、推薦，採取專門化與人設化策略。<br>那些針對觸及受眾、引發互動留言的資訊，更容易被聚集流量。<br>
                    <span class="highlight">請回憶，演算法經常將哪一類熱門人設推到你眼前？</span>`, 
            pool: ['風趣的人', 'EMO 的人', '自信的人', '友善的人', '努力的人', '專業的人'] 
        }
    ];

    let currentQIndex = 0;
    let displayOptions = []; 
    let userSelections = []; 

    function initQuestion() {
        const q = questions[currentQIndex];
        if (!q) { submitData(); return; }
        document.getElementById('progress').innerText = `STEP ${currentQIndex + 1} / ${questions.length}`;
        document.getElementById('question-title').innerHTML = q.title;
        q.pool = shuffle([...q.pool]);
        displayOptions = q.pool.splice(0, 4);
        renderOptions();
    }

    function renderOptions() {
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        displayOptions.forEach((opt, index) => {
            const div = document.createElement('div');
            div.className = 'option-box';
            div.innerText = opt;
            div.onclick = () => handleSelect(index);
            container.appendChild(div);
        });
    }

    function handleSelect(index) {
        const q = questions[currentQIndex];
        userSelections.push({ question: q.id, answer: displayOptions[index] });
        if (q.pool.length > 0) {
            displayOptions[index] = q.pool.shift();
            renderOptions();
        } else {
            currentQIndex++;
            initQuestion();
        }
    }

    async function submitData() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('loading-section').classList.remove('hidden');

        const webhookUrl = "https://default399232fb17d145cabda65b540441bd.62.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/55b4f53f3add49a6a7649d2a96347ba1/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=bOCEhYXI3SA1LK2swv-VEtDtgPBtEY78JEOhl3XRyzI";
        
        let payload = { "填答時間": new Date().toISOString() };
        userSelections.forEach(s => { payload[s.answer] = "✔"; });

        try {
            await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (e) {
            console.error("傳送失敗:", e);
        }

        // 結束後顯示感謝畫面
        document.getElementById('loading-section').classList.add('hidden');
        document.getElementById('thank-you').classList.remove('hidden');
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    initQuestion();
</script>

</body>
</html>
